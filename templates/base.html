{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Photo Album{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'albums/css/style.css' %}">
</head>
<body>
<header class="site-header">
    <div class="container">
        <nav>
            <a href="/" class="button">Albums</a>
            {% if user.is_authenticated %}
                <a href="{% url 'albums:album-create-with-photo' %}" class="button button-secondary">Create Album + Photo</a>
                <a href="{% url 'logout' %}" class="button button-secondary">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="button button-secondary">Login</a>
            {% endif %}
        </nav>
    </div>
</header>
<main class="container">
    {% if messages %}
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
